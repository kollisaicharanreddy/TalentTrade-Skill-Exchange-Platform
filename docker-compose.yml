version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database Service
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: talenttrade-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: talenttrade
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Named volume to persist database files across container lifecycles
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Production-grade health check to verify PostgreSQL is accepting connections
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d talenttrade" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - talenttrade-network

  # ==========================================
  # Spring Boot Application Service
  # ==========================================
  app:
    image: talenttrade-app:v2
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talenttrade-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Connect to PostgreSQL container using service name 'db' as hostname
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/talenttrade
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Profile and security configurations
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SPRING_JPA_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-saicharanreddykolli@gmail.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-http://localhost/oauth2/redirect}
      # Ensure Spring Boot logging is colorized inside terminal logs
      SPRING_OUTPUT_ANSI_ENABLED: ALWAYS
    depends_on:
      db:
        # Wait until the PostgreSQL database container health check passes
        condition: service_healthy
    networks:
      - talenttrade-network

  # ==========================================
  # React / Vite Frontend Service (Nginx)
  # ==========================================
  frontend:
    image: talenttrade-frontend:v2
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
        - VITE_WS_URL=${VITE_WS_URL:-/ws}
    container_name: talenttrade-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - talenttrade-network

# ==========================================
# Network and Volume Declarations
# ==========================================
networks:
  # Isolated network for secure container-to-container communication
  talenttrade-network:
    driver: bridge

volumes:
  # Named volume for database persistence
  postgres_data:
    driver: local
