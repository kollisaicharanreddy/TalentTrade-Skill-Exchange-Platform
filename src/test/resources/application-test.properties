spring.application.name=talenttrade-test

# Use in-memory H2 Database for integration tests
spring.datasource.url=jdbc:h2:mem:talenttrade;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Config for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Test Config
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=3600000

# OAuth2 Dummy Client config
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Admin email configuration
admin.email=saicharanreddykolli@gmail.com
app.oauth2.authorized-redirect-uri=http://localhost:5173/oauth2/redirect
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
server.port=0
