name: TalentTrade Continuous Integration

# Triggers for the CI workflow: Push and Pull Request on key branches
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Ensures that subsequent pushes to the same PR cancel previous running builds to optimize resource usage
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Job 1: Backend Build and Test (Spring Boot)
  # ==========================================
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Caching Maven dependencies automatically using setup-java v4
          cache: 'maven'

      - name: Compile Backend & Run Tests
        # Compiles the code and executes unit + integration tests.
        # Failures in testing will stop the pipeline immediately.
        run: mvn clean test --batch-mode --errors

      # =========================================================================
      # FUTURE READY HOOKS: CODE COVERAGE & SECURITY SCANS
      # =========================================================================
      # To add SonarCloud / JaCoCo Code Coverage:
      # - name: Run SonarQube Analysis
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #   run: mvn sonar:sonar
      #
      # To add Dependency Check/OWASP Scan:
      # - name: OWASP Dependency-Check Scan
      #   run: mvn org.owasp:dependency-check-maven:check

  # ==========================================
  # Job 2: Frontend Build (React/Vite)
  # ==========================================
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache npm dependencies based on lockfile in frontend directory
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Compile & Build Frontend Assets
        # Builds the Vite/React application. Fails if linting or compilation fails.
        run: npm run build

      # =========================================================================
      # FUTURE READY HOOKS: FRONTEND LINT & TEST
      # =========================================================================
      # To add Jest or Vitest Unit Testing:
      # - name: Run Frontend Tests
      #   run: npm test -- --run
      #
      # To add ESLint / Oxlint Checks:
      # - name: Run Linter
      #   run: npm run lint

  # ==========================================
  # Job 3: Docker Image Verification
  # ==========================================
  docker-validation:
    name: Docker Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Docker Buildx is required for advanced caching and multi-stage building in GitHub Actions
        uses: docker/setup-buildx-action@v3

      - name: Validate Backend Dockerfile Build
        # Builds the backend container image to verify there are no compilation or packing errors.
        # push: false ensures it is not uploaded to any container registry.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: talenttrade-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Frontend Dockerfile Build
        # Builds the frontend Nginx-serving container image to verify static assets build and pack properly.
        # push: false ensures it is not uploaded to any container registry.
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: talenttrade-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================================================================
      # FUTURE READY HOOKS: SECURITY SCANNING & REGISTRY PUBLISHING
      # =========================================================================
      # To scan Docker images for vulnerabilities using Trivy:
      # - name: Run Trivy vulnerability scanner
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: 'talenttrade-app:latest'
      #     format: 'table'
      #     exit-code: '1'
      #     ignore-unfixed: true
      #     severity: 'CRITICAL,HIGH'
      #
      # To publish verified images to GitHub Packages (GHCR) or DockerHub:
      # - name: Log in to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push Docker Images
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}/talenttrade-app:latest

  # ==========================================
  # Job 4: Unified CI Status Gate
  # ==========================================
  ci-status-check:
    name: CI Status Gate
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-validation]
    # This step will only run if all previous dependent jobs succeed
    steps:
      - name: Pipeline Completed Successfully
        run: |
          echo "============================================="
          echo "SUCCESS: Backend, Frontend, and Docker CI runs passed!"
          echo "============================================="
