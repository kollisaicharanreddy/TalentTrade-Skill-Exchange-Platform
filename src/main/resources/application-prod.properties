# ==============================================================================
# Production Configuration Profile (application-prod.properties)
# ==============================================================================

# Database Configuration
# In production, credentials MUST be provided via environment variables.
# The application will fail-fast if these are missing, which is a key security practice.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate Configuration
# Default to validate for schema integrity, but can be set to update for initial migrations.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
# Force JWT secret to be loaded from environment variable in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS & WebSocket Allowed Origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging Configuration
# Root logs are set to INFO to minimize console clutter. 
# Detailed SQL traces are disabled to prevent exposing sensitive database operations or parameters.
logging.level.root=INFO
logging.level.com.talenttrade=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Security Error Handling Improvements
# Ensure JVM stack traces are never exposed in REST API error responses
server.error.include-stacktrace=never
server.error.include-message=never
